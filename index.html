<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1A6FBA">
  <meta name="description" content="উত্তরবঙ্গের কুচবিহার, শিলিগুড়ি সহ সব শহরের বিশেষজ্ঞ ডাক্তার ও হাসপাতালের তথ্য। ঘরে বসেই সেরা ডাক্তার খুঁজুন।">
  
  <!-- PWA & iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="স্বাস্থ্য সেতু">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="উত্তরবঙ্গ স্বাস্থ্য সেতু">
  <meta property="og:description" content="ঘরে বসেই পান সেরা ডাক্তারের খোঁজ">
  <meta property="og:image" content="/assets/images/og-cover.jpg">
  <meta property="og:locale" content="bn_IN">

  <title>উত্তরবঙ্গ স্বাস্থ্য সেতু | ডাক্তার ও হাসপাতালের তথ্য</title>

  <!-- Fonts: Bengali First -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <!-- App Container -->
  <div id="app-container">
    
    <!-- Top App Bar (Dynamic per page) -->
    <header id="topbar" class="topbar">
      <div class="topbar__left">
        <button id="topbar-back" class="topbar__btn" aria-label="Back" style="display: none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>
      <h1 id="topbar-title" class="topbar__title">স্বাস্থ্য সেতু</h1>
      <div class="topbar__right">
        <button id="topbar-search" class="topbar__btn" aria-label="Search">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
      </div>
    </header>
    <!-- Main Scrollable Content Area -->
    <main id="main-content" class="main-content">
      <!-- Router will inject pages here -->
      <div class="skeleton-container">
        <div class="skeleton-card"><div class="skeleton-image animate-pulse"></div><div class="skeleton-line w-60 animate-pulse"></div><div class="skeleton-line w-40 animate-pulse"></div></div>
        <div class="skeleton-card"><div class="skeleton-image animate-pulse"></div><div class="skeleton-line w-60 animate-pulse"></div><div class="skeleton-line w-40 animate-pulse"></div></div>
      </div>
    </main>

    <!-- Floating Action Button (Emergency) -->
    <div id="fab-emergency" class="fab">
      <button class="fab__trigger" aria-label="Emergency">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" fill="#E53E3E" stroke="#E53E3E"/></svg>
      </button>
      <div class="fab__menu" id="fab-menu">
        <!-- Populated dynamically -->
      </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav id="bottom-navbar" class="navbar">
      <a href="#/" class="navbar__item active" data-route="/">
        <svg class="navbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="navbar__label">হোম</span>
      </a>
      <a href="#/doctors" class="navbar__item" data-route="/doctors">
        <svg class="navbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="navbar__label">ডাক্তার</span>
      </a>
      <a href="#/hospitals" class="navbar__item" data-route="/hospitals">
        <svg class="navbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span class="navbar__label">হাসপাতাল</span>
      </a>
      <a href="#/symptoms" class="navbar__item" data-route="/symptoms">
        <svg class="navbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <span class="navbar__label">উপসর্গ</span>
      </a>
      <a href="#/more" class="navbar__item" data-route="/more">
        <svg class="navbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <span class="navbar__label">আরো</span>
      </a>
    </nav>

    <!-- Global Modal Container -->
    <div id="modal-overlay" class="modal-overlay">
      <div id="modal-container" class="modal-container">
        <!-- Modal content injected here -->
      </div>
    </div>
    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App Scripts (Module) -->
  <script type="module" src="/src/js/app.js"></script>
</body>
        </html>
